name: CI

on:
  pull_request:
  push:
    branches: [main, master]

env:
  HUSKY: 0

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run build

  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Workspaces + domain package live at repo root; dist is not committed.
      - run: npm ci
      - run: npm run build:domain
      - name: Backend quality
        working-directory: backend
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run test:run
          npm run build

  db-template:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aligner_crm
          MYSQL_USER: aligner
          MYSQL_PASSWORD: aligner
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ualigner -paligner"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
          --health-start-period=20s
    env:
      SOURCE_DB_URL: mysql://aligner:aligner@127.0.0.1:3306/aligner_crm
      JWT_SECRET: ci-template-jwt-secret
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:domain
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Apply schema + demo seed
        run: npm run db:setup
      - name: Demo seed smoke
        working-directory: backend
        run: |
          npx vitest run tests/integration/demo-login.seed.test.ts \
            tests/integration/demo-seed.smoke.test.ts

  e2e-smoke:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: aligner_crm
          MYSQL_USER: aligner
          MYSQL_PASSWORD: aligner
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -ualigner -paligner"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=30
          --health-start-period=20s
    env:
      SOURCE_DB_URL: mysql://aligner:aligner@127.0.0.1:3306/aligner_crm
      JWT_SECRET: ci-e2e-jwt-secret
      CORS_ORIGIN: http://127.0.0.1:3000
      NODE_ENV: development
      VITE_USE_API: "true"
      HUSKY: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:domain
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Apply schema + demo seed
        run: npm run db:setup
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E smoke
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-trace
          path: test-results/
          if-no-files-found: ignore
