name: CI

on:
  pull_request:
  push:
    branches: [main, master]

env:
  HUSKY: 0

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:run
      - run: npm run build

  backend-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Workspaces + domain package live at repo root; dist is not committed.
      - run: npm ci
      - run: npm run build:domain
      - name: Backend quality
        working-directory: backend
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run test:run
          npm run build
